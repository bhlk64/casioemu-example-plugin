name: Auto build and pre-release

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  BUILD_CONFIGURATION: Release

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: "21"
        distribution: temurin
        cache: gradle

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build APK, .so
      run: ./gradlew assembleRelease

    - name: Upload TEST
      uses: actions/upload-artifact@v7
      with:
        name: native-libs
        path: app/build/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib/**/*.so
        # path: .
        archive: true

    - name: Dump CMake error (if failed)
      if: failure()
      run: |
        find . -name "CMakeError.log" -exec cat {} \;
        find . -name "CMakeOutput.log" -exec cat {} \;

  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: ./artifacts

    - name: Prepare release
      run: |
        mkdir -p release_assets
        COMMIT=${GITHUB_SHA::7}
        VERSION=1.0.0
        # copy + rename .so
        find ./artifacts -name "*.so" | while read file; do
          abi=$(basename $(dirname "$file"))
          name=$(basename "$file" .so)
          name=${name#lib}
        
          cp "$file" "release_assets/${name}-${COMMIT}-${VERSION}-${abi}.so"
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: stable-${{ github.sha }}
        name: "🚧 Android Auto Build"
        body: "Auto Android build from stable branch"
        files: release_assets/*
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}